spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trigao}
    username: ${SPRING_DATASOURCE_USERNAME:trigao_user}
    password: ${SPRING_DATASOURCE_PASSWORD:trigao_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

app:
  jwt:
    secret: ${JWT_SECRET:trigao-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000  # 24 horas

abacatepay:
  api-key: ${ABACATEPAY_API_KEY:}
  base-url: ${ABACATEPAY_BASE_URL:https://api.abacatepay.com/v2}

logging:
  level:
    com.trigao: INFO
    org.springframework.security: WARN
