<!-- src/app/features/auth/pages/login/login.component.html -->

<div class="login-page">
  <div class="login-container">
    <!-- Logo -->
    <div class="login-header">
      <img src="assets/logo-trigao.png" alt="Trigão Panificadora" class="login-logo">
      <h1 class="login-title">Painel Administrativo</h1>
      <p class="login-subtitle">Entre com suas credenciais</p>
    </div>

    <!-- Formulário -->
    <form class="login-form" (ngSubmit)="onSubmit()">
      <!-- Email -->
      <div class="form-group">
        <label for="email" class="form-label">
          <i class="ph ph-envelope"></i>
          Email
        </label>
        <input
          type="email"
          id="email"
          class="form-input"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@trigao.com"
          required
          autocomplete="email">
      </div>

      <!-- Senha -->
      <div class="form-group">
        <label for="password" class="form-label">
          <i class="ph ph-lock"></i>
          Senha
        </label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            class="form-input"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password">
          <button
            type="button"
            class="toggle-password"
            (click)="togglePasswordVisibility()">
            <i [class]="showPassword ? 'ph-bold ph-eye-slash' : 'ph-bold ph-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Mensagem de Erro -->
      <div class="error-message" *ngIf="errorMessage">
        <i class="ph-bold ph-warning-circle"></i>
        {{ errorMessage }}
      </div>

      <!-- Botão de Login -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="isLoading">
        <span *ngIf="!isLoading">
          <i class="ph-bold ph-sign-in"></i>
          Entrar
        </span>
        <span *ngIf="isLoading" class="loading-spinner">
          <i class="ph ph-circle-notch"></i>
          Entrando...
        </span>
      </button>
    </form>

    <!-- Credenciais Demo -->
    <div class="demo-credentials">
      <p class="demo-title">
        <i class="ph ph-info"></i>
        Credenciais de Demonstração
      </p>
      <p class="demo-text">
        <strong>Email:</strong> admin@trigao.com<br>
        <strong>Senha:</strong> admin123
      </p>
    </div>
  </div>
</div>
