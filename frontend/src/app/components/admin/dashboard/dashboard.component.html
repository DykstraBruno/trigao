<div class="admin-page">
  <div class="container">
    <h1>Painel Administrativo</h1>
    <div class="admin-cards">
      <div class="admin-card card" *ngFor="let c of cards" (click)="navigate(c.route)">
        <span class="material-icons">{{ c.icon }}</span>
        <h3>{{ c.label }}</h3>
        <p>{{ c.desc }}</p>
      </div>
    </div>
  </div>
</div>
