<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo">
      <h2>Trigão <span>Panificadora</span></h2>
    </div>
    <h3>Criar conta</h3>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" formControlName="name" placeholder="Seu nome"
               [class.invalid]="form.get('name')!.invalid && form.get('name')!.touched">
        <span class="error-msg" *ngIf="form.get('name')!.invalid && form.get('name')!.touched">
          Nome obrigatório (mín. 2 caracteres)
        </span>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="seu@email.com"
               [class.invalid]="form.get('email')!.invalid && form.get('email')!.touched">
        <span class="error-msg" *ngIf="form.get('email')!.invalid && form.get('email')!.touched">Email inválido</span>
      </div>
      <div class="form-group">
        <label>Telefone (opcional)</label>
        <input type="tel" formControlName="phone" placeholder="(11) 99999-9999">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres"
               [class.invalid]="form.get('password')!.invalid && form.get('password')!.touched">
        <span class="error-msg" *ngIf="form.get('password')!.invalid && form.get('password')!.touched">
          Senha obrigatória (mín. 6 caracteres)
        </span>
      </div>
      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        {{ loading ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="auth-link">
      Já tem conta? <a routerLink="/login">Entrar</a>
    </p>
  </div>
</div>
